version: 1
disable_existing_loggers: False

formatters:
  simple:
    format: "%(message)s"
#    format: "%(name)s %(levelname)s %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: simple
    stream: ext://sys.stdout

loggers:
  ksblib.DependencyResolver:
    level: INFO
#    level: DEBUG
    handlers: [console]
    propagate: no

root:
  level: DEBUG
  handlers: [console]
